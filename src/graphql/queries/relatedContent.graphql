query RelatedContent($genres: String, $exclude: String, $loc: [Locales!], $limit: Int) {
  ContentDetailPage(
    where: {
      _and: [
        { Genres: { contains: $genres } }
        { _metadata: { key: { notEq: $exclude } } }
      ]
    }
    locale: $loc
    limit: $limit
    variation: { include: ALL }
  ) {
    items {
      _metadata {
        key
        url {
          default
          hierarchical
        }
      }
      metaTitle: MetaTitle
      posterImage: PosterImage {
        ...ContentUrl
      }
      duration: Duration
      quality: Quality
      genres: Genres
    }
  }
}
