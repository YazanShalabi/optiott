query ContentListing($contentType: String, $loc: [Locales!], $limit: Int, $skip: Int) {
  ContentDetailPage(
    where: { ContentType: { eq: $contentType } }
    locale: $loc
    limit: $limit
    skip: $skip
    variation: { include: ALL }
  ) {
    items {
      _metadata {
        key
        url {
          default
          hierarchical
        }
      }
      metaTitle: MetaTitle
      posterImage: PosterImage {
        ...ContentUrl
      }
      duration: Duration
      quality: Quality
      rating: Rating
      genres: Genres
    }
    cursor
    total
  }
}
