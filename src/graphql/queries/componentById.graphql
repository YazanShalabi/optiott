query ComponentById($key: String!, $ver: String, $loc: [Locales!]) {
  _Component(
    where: { _metadata: { key: { eq: $key }, version: { eq: $ver } } }
    locale: $loc
    variation: { include: ALL }
  ) {
    items {
      _metadata {
        key
        version
        types
        displayName
      }
      ...AllComponents
    }
  }
}
